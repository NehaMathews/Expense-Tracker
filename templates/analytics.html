<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>💰 Tracker</h2>
        <a href="/">🏠 Dashboard</a>
        <a href="/analytics">📊 Analytics</a>
        <a href="/budget">💰 Budget</a>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>📊 Analytics Dashboard</h1>

        <!-- Monthly Line Chart -->
        <div class="card">
            <h2>Monthly Spending (This Year)</h2>
            <canvas id="monthlyChart"></canvas>
        </div>

        <!-- Yearly Line Chart -->
        <div class="card">
            <h2>Yearly Spending</h2>
            <canvas id="yearlyChart"></canvas>
        </div>

        <!-- Pie Chart -->
        <div class="card">
            <h2>Category Breakdown (This Year)</h2>
            <canvas id="pieChart"></canvas>
        </div>

    </div>

</div>

<script>
    // -------- Monthly --------
    new Chart(document.getElementById("monthlyChart"), {
        type: "line",
        data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{
                label: "Monthly Spending",
                data: {{ monthly | tojson }},
                borderColor: "#4CAF50",
                fill: false,
                tension: 0.3
            }]
        }
    });

    // -------- Yearly --------
    new Chart(document.getElementById("yearlyChart"), {
        type: "line",
        data: {
            labels: {{ yearly.keys() | list | tojson }},
            datasets: [{
                label: "Yearly Spending",
                data: {{ yearly.values() | list | tojson }},
                borderColor: "#9b59b6",
                fill: false,
                tension: 0.3
            }]
        }
    });

    // -------- Pie --------
    new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels: {{ categories.keys() | list | tojson }},
            datasets: [{
                data: {{ categories.values() | list | tojson }}
            }]
        }
    });
</script>

</body>
</html>
